<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Distilllab</title>
    <style>
      button {
        margin-top: 16px;
        margin-right: 12px;
        padding: 10px 16px;
        border: none;
        border-radius: 10px;
        background: #38bdf8;
        color: #0f172a;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover {
        background: #7dd3fc;
      }
      body {
        margin: 0;
        font-family: "Noto Sans", "DejaVu Sans", "Liberation Sans", Arial, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      button,
      p,
      h1 {
        font-family: "Noto Sans", "DejaVu Sans", "Liberation Sans", Arial, sans-serif;
      }
      main {
        max-width: 720px;
        padding: 32px;
      }
      h1 { margin-top: 0; font-size: 2.2rem; }
      p { line-height: 1.6; color: #cbd5e1; }
      code {
        font-family: "DejaVu Sans Mono", "Liberation Mono", monospace;
        background: #1e293b;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Distilllab</h1>
      <p>Tauri shell initialized. This is the temporary Phase 0 desktop page.</p>
      <p>Next we will replace this with the <code>Home / Runtime Console</code>.</p>
      <button id="create-run-button">Create Demo Run</button>
      <button id="create-source-button">Create Demo Source</button>
      <button id="chunk-source-button">Chunk Demo Source</button>
      <button id="extract-work-items-button">Extract Demo Work Items</button>
      <button id="group-project-button">Group Demo Project</button>
      <button id="build-assets-button">Build Demo Assets</button>
      <button id="list-runs-button">List Runs</button>
      <button id="list-sources-button">List Sources</button>
      <button id="list-work-items-button">List Work Items</button>
      <button id="list-projects-button">List Projects</button>
      <button id="list-assets-button">List Assets</button>
      <p>
        <label for="source-id-input">Source ID for chunk lookup:</label>
        <input id="source-id-input" type="text" placeholder="source-..." />
        <button id="list-chunks-button">List Chunks</button>
      </p>
      <p id="result">No result yet.</p>
    </main>
    <script>
      const runButton = document.getElementById("create-run-button");
      const sourceButton = document.getElementById("create-source-button");
      const chunkSourceButton = document.getElementById("chunk-source-button");
      const extractWorkItemsButton = document.getElementById("extract-work-items-button");
      const groupProjectButton = document.getElementById("group-project-button");
      const buildAssetsButton = document.getElementById("build-assets-button");
      const listRunsButton = document.getElementById("list-runs-button");
      const listSourcesButton = document.getElementById("list-sources-button");
      const listWorkItemsButton = document.getElementById("list-work-items-button");
      const listProjectsButton = document.getElementById("list-projects-button");
      const listAssetsButton = document.getElementById("list-assets-button");
      const listChunksButton = document.getElementById("list-chunks-button");
      const sourceIdInput = document.getElementById("source-id-input");
      const result = document.getElementById("result");

      async function invokeCommand(commandName, loadingMessage) {
        result.textContent = loadingMessage;

        try {
          const invoke = window.__TAURI_INTERNALS__?.invoke;

          if (!invoke) {
            result.textContent = "Error: Tauri bridge is not available in the current page context.";
            return;
          }

          const response = await invoke(commandName);
          result.textContent = response;
        } catch (error) {
          result.textContent = `Error: ${error}`;
        }
      }

      runButton.addEventListener("click", async () => {
        await invokeCommand("create_demo_run", "Creating demo run...");
      });

      sourceButton.addEventListener("click", async () => {
        await invokeCommand("create_demo_source", "Creating demo source...");
      });

      chunkSourceButton.addEventListener("click", async () => {
        await invokeCommand("chunk_demo_source", "Chunking demo source...");
      });

      extractWorkItemsButton.addEventListener("click", async () => {
        await invokeCommand("extract_demo_work_items", "Extracting demo work items...");
      });

      groupProjectButton.addEventListener("click", async () => {
        await invokeCommand("group_demo_project", "Grouping demo project...");
      });

      buildAssetsButton.addEventListener("click", async () => {
        await invokeCommand("build_demo_assets", "Building demo assets...");
      });

      listRunsButton.addEventListener("click", async () => {
        await invokeCommand("list_runs", "Loading runs...");
      });

      listSourcesButton.addEventListener("click", async () => {
        await invokeCommand("list_sources", "Loading sources...");
      });

      listWorkItemsButton.addEventListener("click", async () => {
        await invokeCommand("list_work_items", "Loading work items...");
      });

      listProjectsButton.addEventListener("click", async () => {
        await invokeCommand("list_projects", "Loading projects...");
      });

      listAssetsButton.addEventListener("click", async () => {
        await invokeCommand("list_assets", "Loading assets...");
      });

      listChunksButton.addEventListener("click", async () => {
        const sourceId = sourceIdInput.value.trim();

        if (!sourceId) {
          result.textContent = "Error: please enter a source id first.";
          return;
        }

        result.textContent = "Loading chunks...";

        try {
          const invoke = window.__TAURI_INTERNALS__?.invoke;

          if (!invoke) {
            result.textContent = "Error: Tauri bridge is not available in the current page context.";
            return;
          }

          const response = await invoke("list_chunks_for_source", { sourceId });
          result.textContent = response;
        } catch (error) {
          result.textContent = `Error: ${error}`;
        }
      });
    </script>
  </body>
</html>
